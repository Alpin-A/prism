services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_INTERNAL_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Reserved for assignment caching — not yet wired into application code.
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:${REDIS_INTERNAL_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=${REDPANDA_BIND_ADDR}:${REDPANDA_KAFKA_INTERNAL_PORT}
      - --advertise-kafka-addr=localhost:${REDPANDA_KAFKA_PORT}
    ports:
      - "${REDPANDA_KAFKA_PORT}:${REDPANDA_KAFKA_INTERNAL_PORT}"
      - "${REDPANDA_ADMIN_PORT}:${REDPANDA_ADMIN_INTERNAL_PORT}"

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "${PROMETHEUS_PORT}:${PROMETHEUS_INTERNAL_PORT}"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "${GRAFANA_PORT}:${GRAFANA_INTERNAL_PORT}"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT}
      PROMETHEUS_INTERNAL_PORT: ${PROMETHEUS_INTERNAL_PORT}
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
      - ./dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - postgres
  

volumes:
  postgres_data:
  grafana_data: